# Frontend values for apten-chat

name: apten-chat-web

replicaCount: 1

image:
  repository: registry.luxembourg-2.cloud.gcore.dev/59508-197526-76-infra/apten-chat-web
  tag: "v0.0.1"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: registry-secret

# Service configuration
service:
  port: 80
  targetPort: 80

# HTTPRoute configuration
httpRoute:
  enabled: true
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  hostnames:
    - chat.apten.im
  # Backend service to also include in routing (for /api path)
  backendService:
    name: apten-chat-server
    port: 80

# Resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
